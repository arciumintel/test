<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" role="img" aria-label="Readiness model component diagram">
  <rect width="820" height="340" rx="12" fill="#0f172a"/>
  <text x="410" y="34" text-anchor="middle" fill="#e5e7eb" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Learning Readiness score (default model)</text>
  <circle cx="410" cy="175" r="58" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="3"/>
  <text x="410" y="168" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="11">Average score</text>
  <text x="410" y="192" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="22" font-weight="700">72</text>
  <text x="410" y="210" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10">Threshold: 70 = Ready</text>
  <text x="410" y="312" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="10">Four components at 25% each: course completion, quiz performance, concept mastery, required path</text>
</svg>
