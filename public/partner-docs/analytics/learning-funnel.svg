<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-label="Learning funnel diagram">
  <rect width="800" height="280" rx="12" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" fill="#e5e7eb" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Learning funnel (Overview tab)</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Each step divided by previous step = conversion %. Counts events, not unique people.</text>
  <polygon points="120,70 680,70 620,110 180,110" fill="#6366f1" opacity="0.9"/>
  <text x="400" y="95" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Course page views</text>
  <polygon points="180,120 620,120 560,160 240,160" fill="#6366f1" opacity="0.75"/>
  <text x="400" y="145" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Course starts</text>
  <polygon points="240,170 560,170 500,210 300,210" fill="#6366f1" opacity="0.6"/>
  <text x="400" y="195" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Lesson completions</text>
  <polygon points="300,220 500,220 440,255 360,255" fill="#6366f1" opacity="0.45"/>
  <text x="400" y="242" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Quiz passed / Badge earned</text>
</svg>
